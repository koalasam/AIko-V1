services:

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: aiko_llm
    restart: unless-stopped

    ports:
      - "${WS_PORT:-8765}:8765" 

    environment:
      WS_HOST: "0.0.0.0"
      WS_PORT: "${WS_PORT:-8765}"

      LLM_API_BASE:      "${LLM_API_BASE:-http://10.100.0.166:1234/v1}"
      LLM_API_KEY:       "${LLM_API_KEY:-lm-studio}"
      LLM_MODEL:         "${LLM_MODEL:-google/gemma-4-e4b}"
      LLM_SYSTEM_PROMPT: "${LLM_SYSTEM_PROMPT:-test prompt to be ignored}"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - aiko_net

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8765 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  chat:
    build:
      context: ./chat
      dockerfile: Dockerfile
    container_name: aiko_chat
    restart: unless-stopped

    depends_on:
      llm:
        condition: service_healthy

    environment:
      WS_HOST:         "llm_lmstudio"
      WS_PORT:         "${WS_PORT:-8765}"

      YOUTUBE_VIDEO_ID: "${YOUTUBE_VIDEO_ID:-}"
      TWITCH_CHANNEL:   "${TWITCH_CHANNEL:-}"
      ENABLE_YOUTUBE:   "${ENABLE_YOUTUBE:-true}"
      ENABLE_TWITCH:    "${ENABLE_TWITCH:-true}"
      RESTART_DELAY:    "${RESTART_DELAY:-5}"

    networks:
      - aiko_net

networks:
  aiko_net:
    driver: bridge